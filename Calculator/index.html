<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="style.css">
   
</head>

<body>
    <div class="container">
        <div class="display-section">
          <p></p>
        </div>
        <div class="key-number">
            <div class="row1 num">
                <button>C</button>
                <button>X</button>
                <button>%</button>
                <button class="sq">sq</button>


            </div>
            <div class="row2 num">
                <button class="ak">7</button>
                <button class="ak">8</button>
                <button class="ak">9</button>
                <button class="sq">/</button>
            </div>
            <div class="row3 num">
                <button class="ak">4</button>
                <button class="ak">5</button>
                <button class="ak">6</button>
                <button class="sq">*</button>
            </div>
            <div class="row4 num">
                <button class="ak">1</button>
                <button class="ak">2</button>
                <button class="ak">3</button>
                <button class="sq">-</button>
            </div>
            <div class="row5 num">
                <button class="ak">0</button>
                <button class="ak">.</button>
                <button class="ak">=</button>
                <button class="sq">+</button>
            </div>

        </div>

    </div>
    <script src="index.js"></script>

</body>

</html>
